<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Talkio - İstatistikler</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);min-height:100vh;color:#e0e0e0;padding:30px 20px}
    .wrap{max-width:700px;margin:0 auto}
    h1{text-align:center;font-size:2em;margin-bottom:8px;color:#a78bfa}
    .subtitle{text-align:center;color:#6b7280;margin-bottom:30px;font-size:0.9em}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px;margin-bottom:30px}
    .card{background:#1e1e2f;border-radius:14px;padding:24px 16px;text-align:center;border:1px solid rgba(255,255,255,0.08);transition:transform 0.2s}
    .card:hover{transform:translateY(-3px)}
    .card-value{font-size:2.4em;font-weight:700;margin-bottom:6px}
    .card-label{color:#9ca3af;font-size:0.85em;text-transform:uppercase;letter-spacing:1px}
    .online .card-value{color:#34d399}
    .waiting .card-value{color:#fbbf24}
    .matches .card-value{color:#a78bfa}
    .messages .card-value{color:#60a5fa}
    .uptime .card-value{color:#f97316;font-size:1.4em}
    .refresh-row{text-align:center;margin-bottom:20px}
    .refresh-btn{background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;padding:10px 28px;border-radius:25px;cursor:pointer;font-size:0.95em;font-weight:600;transition:all 0.2s}
    .refresh-btn:hover{transform:scale(1.05);box-shadow:0 4px 15px rgba(102,126,234,0.4)}
    .auto-info{color:#6b7280;font-size:0.8em;margin-top:8px}
    .back-link{display:block;text-align:center;margin-top:24px;color:#a78bfa;text-decoration:none;font-size:0.9em}
    .back-link:hover{color:#c4b5fd}
    .last-update{text-align:center;color:#4b5563;font-size:0.78em;margin-top:10px}
    .bar-section{background:#1e1e2f;border-radius:14px;padding:20px;border:1px solid rgba(255,255,255,0.08)}
    .bar-section h2{font-size:1em;color:#9ca3af;margin-bottom:16px;text-transform:uppercase;letter-spacing:1px}
    .bar-item{display:flex;align-items:center;gap:12px;margin-bottom:12px}
    .bar-label{width:100px;font-size:0.85em;color:#d1d5db;flex-shrink:0}
    .bar-track{flex:1;height:18px;background:#2d2d3f;border-radius:9px;overflow:hidden}
    .bar-fill{height:100%;border-radius:9px;transition:width 0.8s ease}
    .bar-num{width:60px;text-align:right;font-size:0.85em;color:#9ca3af;flex-shrink:0}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>📊 Talkio İstatistikleri</h1>
    <p class="subtitle">Gerçek zamanlı platform verileri</p>

    <div class="grid">
      <div class="card online">
        <div class="card-value" id="sOnline">–</div>
        <div class="card-label">Çevrimiçi</div>
      </div>
      <div class="card waiting">
        <div class="card-value" id="sWaiting">–</div>
        <div class="card-label">Bekliyor</div>
      </div>
      <div class="card matches">
        <div class="card-value" id="sMatches">–</div>
        <div class="card-label">Toplam Eşleşme</div>
      </div>
      <div class="card messages">
        <div class="card-value" id="sMessages">–</div>
        <div class="card-label">Toplam Mesaj</div>
      </div>
      <div class="card uptime">
        <div class="card-value" id="sUptime">–</div>
        <div class="card-label">Çalışma Süresi</div>
      </div>
    </div>

    <div class="bar-section" style="margin-bottom:20px">
      <h2>Anlık Durum</h2>
      <div class="bar-item">
        <span class="bar-label">Çevrimiçi</span>
        <div class="bar-track"><div class="bar-fill" id="bOnline" style="background:#34d399;width:0%"></div></div>
        <span class="bar-num" id="bOnlineN">0</span>
      </div>
      <div class="bar-item">
        <span class="bar-label">Bekliyor</span>
        <div class="bar-track"><div class="bar-fill" id="bWaiting" style="background:#fbbf24;width:0%"></div></div>
        <span class="bar-num" id="bWaitingN">0</span>
      </div>
    </div>

    <div class="refresh-row">
      <button class="refresh-btn" onclick="load()">🔄 Yenile</button>
      <div class="auto-info">Her 10 saniyede otomatik yenilenir</div>
    </div>
    <div class="last-update" id="lastUpdate"></div>
    <a href="/" class="back-link">← Ana Sayfaya Dön</a>
  </div>

  <script>
    async function load() {
      try {
        const d = await fetch('/api/stats').then(r => r.json());
        document.getElementById('sOnline').textContent = d.online;
        document.getElementById('sWaiting').textContent = d.waiting;
        document.getElementById('sMatches').textContent = d.totalMatches.toLocaleString('tr-TR');
        document.getElementById('sMessages').textContent = d.totalMessages.toLocaleString('tr-TR');
        document.getElementById('sUptime').textContent = d.uptime;
        const max = Math.max(d.online, 1);
        document.getElementById('bOnline').style.width = Math.min(100, (d.online / max) * 100) + '%';
        document.getElementById('bOnlineN').textContent = d.online;
        document.getElementById('bWaiting').style.width = Math.min(100, (d.waiting / max) * 100) + '%';
        document.getElementById('bWaitingN').textContent = d.waiting;
        document.getElementById('lastUpdate').textContent = 'Son güncelleme: ' + new Date().toLocaleTimeString('tr-TR');
      } catch(e) {
        document.getElementById('lastUpdate').textContent = 'Bağlantı hatası';
      }
    }
    load();
    setInterval(load, 10000);
  </script>
</body>
</html>
